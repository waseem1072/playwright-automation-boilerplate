name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write   # required for peaceiris/actions-gh-pages to push to gh-pages branch

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
      SEND_TEAMS_REPORT: 'true'
      SHOW_HTML_REPORT_BUTTON: 'true'
      PLAYWRIGHT_REPORT_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test
    - name: Upload HTML report artifact
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
    - name: Deploy report to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      if: ${{ !cancelled() && github.ref == 'refs/heads/main' }}
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./playwright-report
